<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réinitialisation - Santé Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
        <h2 class="text-2xl font-bold text-center text-emerald-600 mb-6">Nouveau mot de passe</h2>
        <form id="reset-form">
            <input type="password" id="password" placeholder="Nouveau mot de passe" class="w-full p-3 border rounded-lg mb-4" required>
            <input type="password" id="confirm" placeholder="Confirmer" class="w-full p-3 border rounded-lg mb-6" required>
            <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold">Mettre à jour</button>
        </form>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            Swal.fire({ icon: 'error', title: 'Lien invalide', text: 'Token manquant.' }).then(() => window.location.href = '/');
        }
        
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            
            if (password !== confirm) {
                Swal.fire({ icon: 'error', title: 'Erreur', text: 'Les mots de passe ne correspondent pas' });
                return;
            }
            
            if (password.length < 6) {
                Swal.fire({ icon: 'error', title: 'Trop court', text: 'Minimum 6 caractères' });
                return;
            }
            
            Swal.fire({ title: 'Mise à jour...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
            
            try {
                const response = await fetch(`${window.CONFIG.API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    Swal.fire({ icon: 'success', title: 'Succès !', text: 'Votre mot de passe a été modifié.' }).then(() => {
                        window.location.href = '/';
                    });
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Erreur', text: err.message });
            }
        });
    </script>
</body>
</html>
