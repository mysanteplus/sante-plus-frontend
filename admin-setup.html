<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - Santé Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-white rounded-2xl shadow-xl flex items-center justify-center mx-auto mb-4">
                <img src="/assets/images/logo-general-icon.png" class="w-16 h-16 object-contain" alt="Logo">
            </div>
            <h1 class="text-2xl font-black text-white">Santé Plus Services</h1>
            <p class="text-slate-400 text-sm mt-1">Réinitialisation du mot de passe</p>
        </div>

        <!-- Carte -->
        <div class="bg-white rounded-2xl shadow-2xl p-6">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fa-solid fa-key text-emerald-600 text-2xl"></i>
                </div>
                <h2 class="text-xl font-black text-slate-800">Nouveau mot de passe</h2>
                <p class="text-xs text-slate-400 mt-1">Choisissez un mot de passe sécurisé</p>
            </div>

            <form id="reset-form" class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 block mb-1">Nouveau mot de passe</label>
                    <input type="password" id="password" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" placeholder="••••••" required>
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-400 block mb-1">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" placeholder="••••••" required>
                </div>
                
                <button type="submit" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-black text-[10px] uppercase tracking-wider shadow-lg hover:bg-emerald-700 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-check-circle"></i> Mettre à jour
                </button>
            </form>
        </div>
        
        <div class="text-center mt-6">
            <p class="text-[10px] text-slate-500">Santé Plus Services - Votre partenaire de confiance</p>
        </div>
    </div>

    <script>
        // URL de l'API - à modifier si besoin
        const API_URL = 'https://sante-plus-backend-main.onrender.com/api';
        
        // Récupérer le token depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        // Vérifier si le token existe
        if (!token) {
            Swal.fire({
                icon: 'error',
                title: 'Lien invalide',
                text: 'Token de réinitialisation manquant.',
                confirmButtonColor: '#10B981'
            }).then(() => {
                window.location.href = '/';
            });
        }
        
        // Gérer la soumission du formulaire
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            if (!password || !confirm) {
                Swal.fire({
                    icon: 'error',
                    title: 'Champs manquants',
                    text: 'Veuillez remplir tous les champs',
                    confirmButtonColor: '#F43F5E'
                });
                return;
            }
            
            if (password !== confirm) {
                Swal.fire({
                    icon: 'error',
                    title: 'Erreur',
                    text: 'Les mots de passe ne correspondent pas',
                    confirmButtonColor: '#F43F5E'
                });
                return;
            }
            
            if (password.length < 6) {
                Swal.fire({
                    icon: 'error',
                    title: 'Mot de passe trop court',
                    text: 'Minimum 6 caractères',
                    confirmButtonColor: '#F43F5E'
                });
                return;
            }
            
            Swal.fire({
                title: 'Mise à jour...',
                didOpen: () => Swal.showLoading(),
                allowOutsideClick: false
            });
            
            try {
                console.log('🔵 Envoi requête à:', `${API_URL}/auth/reset-password`);
                console.log('🔵 Token:', token);
                
                const response = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });
                
                const data = await response.json();
                console.log('📥 Réponse:', data);
                
                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Succès !',
                        text: 'Votre mot de passe a été modifié. Vous pouvez maintenant vous connecter.',
                        confirmButtonColor: '#10B981'
                    }).then(() => {
                        window.location.href = '/';
                    });
                } else {
                    throw new Error(data.error || 'Erreur lors de la réinitialisation');
                }
            } catch (err) {
                Swal.close();
                console.error('❌ Erreur:', err);
                Swal.fire({
                    icon: 'error',
                    title: 'Erreur',
                    text: err.message || 'Impossible de réinitialiser le mot de passe',
                    confirmButtonColor: '#F43F5E'
                });
            }
        });
    </script>
</body>
</html>
